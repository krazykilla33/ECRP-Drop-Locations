<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drop Locations</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="drop-locations.css?v=10" />
  <style>
    #startupError{display:none;position:fixed;z-index:99999;left:20px;right:20px;bottom:20px;padding:14px 16px;border:1px solid #ef6464;border-radius:10px;background:#2a1115;color:#ffd7d7;font:14px/1.4 system-ui,sans-serif;white-space:pre-wrap}
  </style>
</head>
<body>
  <main class="map-shell">
    <section class="map-stage" aria-label="Interactive drop-location map">
      <div id="dropMap"></div>
      <div class="floating-controls" aria-label="Map controls">
        <div class="segmented" role="group" aria-label="Map region">
          <button id="sanAndreasBtn" class="segment active" type="button">San Andreas</button>
          <button id="cayoBtn" class="segment" type="button">Cayo Perico</button>
        </div>
        <div class="segmented" role="group" aria-label="Map style">
          <button id="satelliteBtn" class="segment active" type="button">Satellite</button>
          <button id="atlasBtn" class="segment" type="button">Atlas</button>
        </div>
      </div>
      <div id="placementBanner" class="placement-banner hidden" role="status"></div>
    </section>

    <aside class="sidebar">
      <header class="sidebar-header">
        <div>
          <p class="eyebrow">INTERACTIVE MAP</p>
          <h1>Drop Locations</h1>
          <p class="subtitle">Select a location to find it on the map.</p>
        </div>
        <button id="editModeBtn" class="icon-button" type="button" aria-pressed="false" title="Place or move markers">Edit</button>
      </header>
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input id="dropSearch" type="search" placeholder="Search locations..." autocomplete="off" />
        <button id="clearSearchBtn" class="clear-search hidden" type="button" aria-label="Clear search">×</button>
      </div>
      <div class="toolbar">
        <button id="showAllBtn" class="filter active" type="button">All</button>
        <button id="showMappedBtn" class="filter" type="button">Mapped</button>
        <button id="showUnmappedBtn" class="filter" type="button">Unmapped</button>
        <span id="locationCount" class="count-pill"></span>
      </div>
      <section id="editorPanel" class="editor-panel hidden" aria-label="Marker editor">
        <strong>Marker placement mode</strong>
        <p>Select a location below, then click its exact position on the map. Existing markers can be moved the same way.</p>
        <div class="editor-actions">
          <button id="copyDataBtn" type="button">Copy data</button>
          <button id="downloadDataBtn" type="button">Download JS</button>
          <button id="resetLocalBtn" class="danger" type="button">Clear saved edits</button>
        </div>
      </section>
      <div id="dropList" class="location-list"></div>
      <div id="emptyState" class="empty-state hidden">No locations match your search.</div>
    </aside>
  </main>

  <div id="startupError"></div>
  <script>
    (function () {
      const errorBox = document.getElementById('startupError');
      function fail(message) {
        errorBox.style.display = 'block';
        errorBox.textContent = 'Map startup error: ' + message;
      }
      function load(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = () => reject(new Error('Could not load ' + src));
          document.body.appendChild(script);
        });
      }
      async function start() {
        try {
          try {
            await load('https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js');
          } catch (_) {
            await load('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js');
          }
          if (!window.L) throw new Error('Leaflet did not initialize.');
          await load('data/drop-locations.js?v=10');
          if (!Array.isArray(window.DROP_LOCATIONS)) throw new Error('data/drop-locations.js loaded, but DROP_LOCATIONS was not found.');
          await load('drop-locations.js?v=10');
        } catch (error) {
          console.error(error);
          fail(error.message || String(error));
        }
      }
      start();
    })();
  </script>
</body>
</html>
